server.port=8087

# Primary DataSource (Docker)
spring.datasource.url=jdbc:mysql://reservation-admin-mysql:3306/co_ownership_booking_admin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Admin DataSource (Main Database for Admin Service)
spring.datasource.admin.url=jdbc:mysql://reservation-admin-mysql:3306/co_ownership_booking_admin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.admin.username=root
spring.datasource.admin.password=password
spring.datasource.admin.driver-class-name=com.mysql.cj.jdbc.Driver

# Booking DataSource (Source Database for synchronization)
spring.datasource.booking.url=jdbc:mysql://reservation-mysql:3306/co_ownership_booking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.booking.username=root
spring.datasource.booking.password=password
spring.datasource.booking.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable DevTools to avoid conflict during reload
spring.devtools.restart.enabled=false

# JWT Secret (Synchronized with user-account-service)
jwt.secret=RjlaYTRjY2RmYS04NjcwLTRkMDMtYmI1OS02ZmMxNmIzNjAwYmY=

# Scheduled Job - Sync every 5 minutes
sync.schedule.cron=0 */5 * * * ?

# Microservices URLs (Docker names)
reservation.service.url=${RESERVATION_SERVICE_URL:http://reservation-service:8086}
user-account.service.url=${USER_ACCOUNT_SERVICE_URL:http://user-account-service:8083}
group-management.service.url=${GROUP_MANAGEMENT_SERVICE_URL:http://group-management-service:8082}
vehicle.service.url=${VEHICLE_SERVICE_URL:http://vehicle-service:8085}

# Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
