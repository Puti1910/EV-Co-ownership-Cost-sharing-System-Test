# Application Settings
spring.application.name=reservation-service
server.port=8086

# Disable DevTools (to prevent reload issues)
spring.devtools.restart.enabled=false

# Database Configuration (Docker)
spring.datasource.url=jdbc:mysql://reservation-mysql:3306/co_ownership_booking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.packages-to-scan=com.example.reservationservice.model
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.hibernate.jpa.compliance.query=false
spring.jpa.properties.hibernate.jpa.compliance.list=false

# Error Pages
server.error.whitelabel.enabled=false

# Load data.sql automatically after schema creation (Optional if using setup.sql)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# External Service URLs (Docker names)
admin.service.url=${ADMIN_SERVICE_URL:http://reservation-admin-service:8087}
group-management.service.url=${GROUP_MANAGEMENT_SERVICE_URL:http://group-management-service:8082}

# Spring Security - Disable default security if internal
spring.security.user.name=user
spring.security.user.password=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
