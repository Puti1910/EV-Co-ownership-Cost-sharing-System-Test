spring.application.name=VehicleServiceManagementService

# Configuration for MySQL Database connection (Docker)
spring.datasource.url=jdbc:mysql://vehicle-mysql:3306/vehicle_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&rewriteBatchedStatements=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true  
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.id.new_generator_mappings=true
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Server Configuration
server.port=8085
server.servlet.context-path=

# External service URLs
group.management.service.url=${GROUP_MANAGEMENT_SERVICE_URL:http://group-management-service:8082}
group.management.service.fallback-url=${GROUP_MANAGEMENT_SERVICE_FALLBACK_URL:http://group-management-service:8082}
reservation.admin.service.url=${RESERVATION_ADMIN_SERVICE_URL:http://reservation-admin-service:8087}

# Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
